name: Refresh signed shortcuts

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 1 * *"

permissions:
  contents: write

concurrency:
  group: refresh-signed-shortcuts
  cancel-in-progress: false

jobs:
  sign-and-publish:
    runs-on: macos-latest
    steps:
      - name: Check out isolated repository
        uses: actions/checkout@v4

      - name: Sign shortcuts for anyone
        run: bash scripts/sign-shortcuts.sh shortcuts/signed

      - name: Store refreshed signatures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shortcuts/signed/*.shortcut
          git diff --cached --quiet || git commit -m "refresh signed shortcuts"
          git push

      - name: Publish signed shortcuts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh release view --json tagName --jq .tagName)"
          gh release upload "$tag" shortcuts/signed/*.shortcut --clobber
